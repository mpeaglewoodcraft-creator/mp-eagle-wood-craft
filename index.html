<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>MP Eagle Wood Craft | Premium Handcrafted Wooden Products</title>
  <meta name="description" content="MP Eagle Wood Craft — premium handcrafted wooden products including laptop stands, key holders, and accessories. Order on Instagram for fast delivery." />
  <meta name="keywords" content="wooden laptop stand, handcrafted wood, key holder wood, pen stand, premium wood craft, MP Eagle Wood Craft, wooden accessories India" />
  <meta property="og:title" content="MP Eagle Wood Craft | Premium Handcrafted Wooden Products" />
  <meta property="og:description" content="Luxury handcrafted wooden products. Order on Instagram." />
  <meta property="og:type" content="website" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;700;900&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    /* ===== RESET & VARIABLES ===== */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --gold: #C9A84C;
      --gold-light: #E8C96E;
      --gold-dim: rgba(201,168,76,0.15);
      --bg: #0A0806;
      --bg2: #0F0C09;
      --bg3: #161208;
      --surface: #1A1510;
      --surface2: #221C14;
      --text: #F0E8D8;
      --text-muted: #9A8A6A;
      --border: rgba(201,168,76,0.18);
      --wood1: #3D2B1A;
      --wood2: #5C3D20;
      --shadow: 0 8px 40px rgba(0,0,0,0.7);
      --radius: 12px;
      --transition: 0.35s cubic-bezier(0.4,0,0.2,1);
    }

    body.light {
      --bg: #F5EFE4;
      --bg2: #EDE4D3;
      --bg3: #E5D9C5;
      --surface: #FDF8F0;
      --surface2: #F0E8D8;
      --text: #1A1208;
      --text-muted: #6B5B3E;
      --border: rgba(201,168,76,0.3);
      --shadow: 0 8px 40px rgba(0,0,0,0.15);
    }

    html { scroll-behavior: smooth; }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--bg);
      color: var(--text);
      overflow-x: hidden;
      transition: background 0.4s, color 0.4s;
    }

    /* ===== LOADER ===== */
    #loader {
      position: fixed; inset: 0;
      background: #050402;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      z-index: 9999;
      transition: opacity 0.6s ease, visibility 0.6s ease;
    }
    #loader.hide { opacity: 0; visibility: hidden; }

    .loader-logo {
      width: 110px; height: 110px;
      border-radius: 50%;
      background: var(--surface);
      border: 2px solid var(--gold);
      display: flex; align-items: center; justify-content: center;
      animation: loaderPulse 1.2s ease forwards;
      box-shadow: 0 0 40px rgba(201,168,76,0.4);
      overflow: hidden;
    }
    .loader-logo img { width: 100%; height: 100%; object-fit: cover; border-radius: 50%; }
    .loader-logo-text {
      font-family: 'Playfair Display', serif;
      font-size: 22px; font-weight: 900;
      color: var(--gold); letter-spacing: 2px;
    }
    .loader-name {
      margin-top: 20px;
      font-family: 'Playfair Display', serif;
      font-size: 18px; color: var(--gold);
      letter-spacing: 4px; text-transform: uppercase;
      animation: loaderPulse 1.2s ease forwards;
    }
    .loader-bar {
      width: 160px; height: 2px;
      background: var(--surface2);
      margin-top: 16px; border-radius: 2px; overflow: hidden;
    }
    .loader-bar-fill {
      height: 100%; background: var(--gold);
      animation: loaderFill 1s ease forwards;
    }
    @keyframes loaderPulse { from { opacity:0; transform:scale(0.9); } to { opacity:1; transform:scale(1); } }
    @keyframes loaderFill { from { width:0; } to { width:100%; } }

    /* ===== NAV ===== */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      padding: 16px 24px;
      display: flex; align-items: center; justify-content: space-between;
      background: rgba(10,8,6,0.85);
      backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
      transition: background 0.4s, padding 0.3s;
    }
    body.light nav { background: rgba(245,239,228,0.9); }
    nav.scrolled { padding: 10px 24px; }

    .nav-brand {
      display: flex; align-items: center; gap: 10px; text-decoration: none;
    }
    .nav-brand-icon {
      width: 40px; height: 40px; border-radius: 8px;
      background: var(--surface2);
      border: 1px solid var(--gold);
      display: flex; align-items: center; justify-content: center;
      font-family: 'Playfair Display', serif;
      font-size: 16px; font-weight: 900; color: var(--gold);
      overflow: hidden;
    }
    .nav-brand-icon img { width: 100%; height: 100%; object-fit: cover; border-radius: 7px; }
    .nav-brand-text {
      font-family: 'Playfair Display', serif;
      font-size: 15px; font-weight: 700; color: var(--gold);
      line-height: 1.2; letter-spacing: 0.5px;
    }
    .nav-brand-sub { font-size: 9px; color: var(--text-muted); letter-spacing: 2px; text-transform: uppercase; }

    .nav-links {
      display: flex; align-items: center; gap: 28px;
      list-style: none;
    }
    .nav-links a {
      color: var(--text-muted); text-decoration: none;
      font-size: 13px; font-weight: 500; letter-spacing: 1px;
      text-transform: uppercase; transition: color 0.2s;
    }
    .nav-links a:hover { color: var(--gold); }

    .nav-actions { display: flex; align-items: center; gap: 12px; }

    .cart-btn {
      position: relative; background: none; border: 1px solid var(--border);
      color: var(--text); padding: 8px 14px; border-radius: 8px;
      cursor: pointer; font-size: 14px; transition: var(--transition);
      display: flex; align-items: center; gap: 6px;
    }
    .cart-btn:hover { border-color: var(--gold); color: var(--gold); }
    .cart-count {
      position: absolute; top: -6px; right: -6px;
      background: var(--gold); color: #000;
      width: 18px; height: 18px; border-radius: 50%;
      font-size: 10px; font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      display: none;
    }
    .cart-count.show { display: flex; }

    .theme-btn {
      background: none; border: 1px solid var(--border);
      color: var(--text); width: 38px; height: 38px;
      border-radius: 8px; cursor: pointer; font-size: 16px;
      transition: var(--transition); display: flex; align-items: center; justify-content: center;
    }
    .theme-btn:hover { border-color: var(--gold); }

    .hamburger {
      display: none; flex-direction: column; gap: 5px;
      background: none; border: none; cursor: pointer; padding: 4px;
    }
    .hamburger span {
      display: block; width: 22px; height: 2px;
      background: var(--text); border-radius: 2px;
      transition: var(--transition);
    }

    .mobile-menu {
      display: none; position: fixed;
      top: 65px; left: 0; right: 0;
      background: var(--bg2);
      border-bottom: 1px solid var(--border);
      padding: 20px 24px; z-index: 99;
      flex-direction: column; gap: 16px;
    }
    .mobile-menu.open { display: flex; }
    .mobile-menu a {
      color: var(--text); text-decoration: none;
      font-size: 15px; font-weight: 500;
      padding: 10px 0; border-bottom: 1px solid var(--border);
      letter-spacing: 1px;
    }

    @media (max-width: 768px) {
      .nav-links { display: none; }
      .hamburger { display: flex; }
    }

    /* ===== HERO ===== */
    .hero {
      min-height: 100vh;
      display: flex; align-items: center;
      padding: 100px 24px 60px;
      position: relative; overflow: hidden;
    }

    .hero-bg {
      position: absolute; inset: 0; z-index: 0;
      background:
        radial-gradient(ellipse 80% 60% at 60% 50%, rgba(92,61,32,0.25) 0%, transparent 70%),
        radial-gradient(ellipse 60% 80% at 20% 80%, rgba(201,168,76,0.07) 0%, transparent 60%),
        linear-gradient(160deg, #050402 0%, #0A0806 40%, #110C07 100%);
    }
    body.light .hero-bg {
      background:
        radial-gradient(ellipse 80% 60% at 60% 50%, rgba(201,168,76,0.12) 0%, transparent 70%),
        linear-gradient(160deg, #F5EFE4 0%, #EDE4D3 100%);
    }

    .hero-wood-lines {
      position: absolute; inset: 0; z-index: 0; opacity: 0.04;
      background-image: repeating-linear-gradient(
        0deg, transparent, transparent 3px,
        rgba(255,255,255,1) 3px, rgba(255,255,255,1) 4px
      );
    }

    .hero-content {
      position: relative; z-index: 1;
      max-width: 680px;
    }

    .hero-badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: var(--gold-dim); border: 1px solid var(--border);
      padding: 6px 16px; border-radius: 100px;
      font-size: 11px; letter-spacing: 2px; text-transform: uppercase;
      color: var(--gold); margin-bottom: 28px;
      animation: fadeUp 0.8s ease both 0.2s;
    }
    .hero-badge::before { content: ''; width: 6px; height: 6px; border-radius: 50%; background: var(--gold); }

    .hero h1 {
      font-family: 'Playfair Display', serif;
      font-size: clamp(38px, 8vw, 72px);
      font-weight: 900; line-height: 1.08;
      color: var(--text); margin-bottom: 8px;
      animation: fadeUp 0.8s ease both 0.35s;
    }
    .hero h1 span { color: var(--gold); }

    .hero-tagline {
      font-size: clamp(14px, 3vw, 18px);
      color: var(--text-muted); line-height: 1.7;
      max-width: 500px; margin-bottom: 40px;
      animation: fadeUp 0.8s ease both 0.5s;
    }

    .hero-ctas {
      display: flex; gap: 14px; flex-wrap: wrap;
      animation: fadeUp 0.8s ease both 0.65s;
    }

    .btn-primary {
      display: inline-flex; align-items: center; gap: 8px;
      background: linear-gradient(135deg, var(--gold), #A8762C);
      color: #000; padding: 14px 28px;
      border-radius: 10px; font-weight: 600;
      font-size: 14px; text-decoration: none; letter-spacing: 0.5px;
      transition: var(--transition); border: none; cursor: pointer;
      box-shadow: 0 4px 20px rgba(201,168,76,0.35);
    }
    .btn-primary:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(201,168,76,0.5);
    }

    .btn-outline {
      display: inline-flex; align-items: center; gap: 8px;
      background: transparent;
      color: var(--text); padding: 14px 28px;
      border-radius: 10px; font-weight: 500;
      font-size: 14px; text-decoration: none; letter-spacing: 0.5px;
      transition: var(--transition); border: 1px solid var(--border);
      cursor: pointer;
    }
    .btn-outline:hover {
      border-color: var(--gold); color: var(--gold);
      transform: translateY(-2px);
    }

    .hero-stats {
      display: flex; gap: 32px; margin-top: 56px;
      animation: fadeUp 0.8s ease both 0.8s;
      flex-wrap: wrap;
    }
    .hero-stat { display: flex; flex-direction: column; gap: 4px; }
    .hero-stat strong {
      font-family: 'Playfair Display', serif;
      font-size: 28px; color: var(--gold); font-weight: 700;
    }
    .hero-stat span { font-size: 12px; color: var(--text-muted); letter-spacing: 1px; text-transform: uppercase; }

    .hero-visual {
      position: absolute; right: -20px; top: 50%;
      transform: translateY(-50%);
      width: min(480px, 45vw);
      height: min(520px, 55vw);
      z-index: 1;
      animation: fadeUp 1s ease both 0.4s;
    }
    .hero-visual-card {
      width: 100%; height: 100%;
      border-radius: 20px;
      background: linear-gradient(145deg, var(--wood2), var(--wood1), #2A1A0A);
      border: 1px solid var(--border);
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative;
      box-shadow: var(--shadow);
    }
    .hero-wood-texture {
      position: absolute; inset: 0; opacity: 0.15;
      background-image:
        repeating-linear-gradient(87deg, transparent, transparent 20px, rgba(255,255,255,0.3) 20px, rgba(255,255,255,0.3) 21px),
        repeating-linear-gradient(92deg, transparent, transparent 15px, rgba(0,0,0,0.2) 15px, rgba(0,0,0,0.2) 16px);
    }
    .hero-product-mockup {
      position: relative; z-index: 1;
      display: flex; flex-direction: column; align-items: center; gap: 8px;
    }
    .hero-mockup-stand {
      width: 160px; height: 110px;
      background: linear-gradient(160deg, #7A5230, #4A2E12);
      border-radius: 8px 8px 0 0;
      border: 1px solid rgba(201,168,76,0.3);
      display: flex; align-items: flex-end; justify-content: center;
      padding-bottom: 10px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.5);
    }
    .hero-mockup-base {
      width: 200px; height: 14px;
      background: linear-gradient(160deg, #6A4220, #3A2010);
      border-radius: 4px;
      border: 1px solid rgba(201,168,76,0.2);
    }
    .hero-gold-badge-circle {
      position: absolute; top: 20px; right: 20px;
      width: 70px; height: 70px; border-radius: 50%;
      background: var(--gold-dim); border: 1px solid var(--gold);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      font-size: 9px; color: var(--gold); text-align: center;
      font-weight: 600; letter-spacing: 0.5px; text-transform: uppercase;
      line-height: 1.3;
    }

    @media (max-width: 768px) {
      .hero-visual { display: none; }
      .hero { padding: 90px 20px 60px; }
    }

    /* ===== OFFER BANNER ===== */
    .offer-banner {
      background: linear-gradient(90deg, #1A1208, #2A1E0A, #1A1208);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 14px 24px;
      overflow: hidden;
    }
    .offer-ticker {
      display: flex; gap: 80px; width: max-content;
      animation: ticker 25s linear infinite;
    }
    .offer-item {
      display: flex; align-items: center; gap: 10px;
      white-space: nowrap; font-size: 13px; color: var(--text-muted);
      font-weight: 500;
    }
    .offer-item strong { color: var(--gold); }
    .offer-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--gold); }
    @keyframes ticker { from { transform: translateX(0); } to { transform: translateX(-50%); } }

    /* ===== SECTION COMMON ===== */
    section { padding: 80px 24px; max-width: 1200px; margin: 0 auto; }
    .section-full { max-width: 100%; padding: 80px 0; }
    .section-inner { max-width: 1200px; margin: 0 auto; padding: 0 24px; }

    .section-label {
      display: inline-block; font-size: 11px; letter-spacing: 3px;
      text-transform: uppercase; color: var(--gold);
      margin-bottom: 12px; font-weight: 600;
    }
    .section-title {
      font-family: 'Playfair Display', serif;
      font-size: clamp(28px, 5vw, 46px);
      font-weight: 800; line-height: 1.15;
      color: var(--text); margin-bottom: 16px;
    }
    .section-title span { color: var(--gold); }
    .section-desc {
      font-size: 15px; color: var(--text-muted);
      line-height: 1.75; max-width: 540px;
    }

    /* ===== HOW IT WORKS ===== */
    .steps-section { background: var(--bg2); }
    .steps-grid {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 2px; margin-top: 56px;
    }
    .step-card {
      background: var(--surface);
      padding: 40px 28px; text-align: center;
      position: relative; transition: var(--transition);
    }
    .step-card:hover { background: var(--surface2); }
    .step-card:first-child { border-radius: var(--radius) 0 0 var(--radius); }
    .step-card:last-child { border-radius: 0 var(--radius) var(--radius) 0; }
    .step-number {
      font-family: 'Playfair Display', serif;
      font-size: 64px; font-weight: 900; color: var(--gold-dim);
      line-height: 1; margin-bottom: 16px; position: relative;
    }
    .step-number::after {
      content: attr(data-n);
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      font-size: 36px; color: var(--gold); font-weight: 900;
    }
    .step-icon {
      font-size: 36px; margin-bottom: 16px;
    }
    .step-title {
      font-family: 'Playfair Display', serif;
      font-size: 18px; font-weight: 700; color: var(--text);
      margin-bottom: 10px;
    }
    .step-desc { font-size: 13px; color: var(--text-muted); line-height: 1.7; }
    .step-arrow {
      position: absolute; right: -12px; top: 50%;
      transform: translateY(-50%);
      color: var(--gold); font-size: 20px; z-index: 1;
    }
    @media (max-width: 768px) {
      .steps-grid { grid-template-columns: 1fr; gap: 2px; }
      .step-card:first-child { border-radius: var(--radius) var(--radius) 0 0; }
      .step-card:last-child { border-radius: 0 0 var(--radius) var(--radius); }
      .step-arrow { display: none; }
    }

    /* ===== TRUST BAR ===== */
    .trust-bar {
      background: var(--surface);
      border-top: 1px solid var(--border);
      border-bottom: 1px solid var(--border);
      padding: 20px 24px;
    }
    .trust-items {
      display: flex; gap: 32px; justify-content: center;
      flex-wrap: wrap; max-width: 900px; margin: 0 auto;
    }
    .trust-item {
      display: flex; align-items: center; gap: 10px;
      font-size: 13px; color: var(--text-muted); font-weight: 500;
    }
    .trust-item span { font-size: 18px; }
    .trust-item strong { color: var(--text); }

    /* ===== PRODUCTS ===== */
    .products-section {}
    .filter-bar {
      display: flex; gap: 8px; flex-wrap: wrap;
      margin: 40px 0 32px;
    }
    .filter-btn {
      background: var(--surface); border: 1px solid var(--border);
      color: var(--text-muted); padding: 9px 20px;
      border-radius: 100px; font-size: 13px; font-weight: 500;
      cursor: pointer; transition: var(--transition); letter-spacing: 0.5px;
    }
    .filter-btn.active, .filter-btn:hover {
      background: var(--gold); border-color: var(--gold);
      color: #000; font-weight: 600;
    }

    .products-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(270px, 1fr));
      gap: 20px;
    }

    .product-card {
      background: var(--surface);
      border-radius: var(--radius);
      border: 1px solid var(--border);
      overflow: hidden; cursor: pointer;
      transition: var(--transition);
      position: relative;
    }
    .product-card:hover {
      transform: translateY(-6px);
      border-color: var(--gold);
      box-shadow: 0 16px 48px rgba(201,168,76,0.15);
    }

    .product-img-wrap {
      position: relative; height: 220px; overflow: hidden;
      background: var(--surface2);
    }
    .product-img-wrap img {
      width: 100%; height: 100%; object-fit: cover;
      transition: transform 0.5s ease;
    }
    .product-card:hover .product-img-wrap img { transform: scale(1.08); }
    .product-img-placeholder {
      width: 100%; height: 100%;
      display: flex; align-items: center; justify-content: center;
      flex-direction: column; gap: 8px;
    }
    .product-img-placeholder .icon { font-size: 48px; }
    .product-img-placeholder span {
      font-size: 11px; color: var(--text-muted); letter-spacing: 1px;
    }

    .product-badge {
      position: absolute; top: 12px; left: 12px;
      background: var(--gold); color: #000;
      font-size: 10px; font-weight: 700;
      padding: 4px 10px; border-radius: 100px;
      letter-spacing: 0.5px; text-transform: uppercase;
    }
    .product-badge.low { background: #E85A2A; color: #fff; }

    .product-info { padding: 18px 18px 20px; }
    .product-name {
      font-family: 'Playfair Display', serif;
      font-size: 16px; font-weight: 700; color: var(--text);
      margin-bottom: 6px; line-height: 1.3;
    }
    .product-desc-short {
      font-size: 12px; color: var(--text-muted);
      margin-bottom: 12px; line-height: 1.6;
    }
    .product-pricing { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .price-original { font-size: 13px; color: var(--text-muted); text-decoration: line-through; }
    .price-sale
